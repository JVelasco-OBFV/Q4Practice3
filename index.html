<body>

    <h2>Javascript For Loop</h2>
    <p id="sample"></p>

    <script>
        let Sample= "";

        for (let x = 0; x < 3; x++){
            Sample += "The number is " + x + "<br>"
        }

        document.getElementById("sample").innerHTML = Sample;
    </script>
</body>
